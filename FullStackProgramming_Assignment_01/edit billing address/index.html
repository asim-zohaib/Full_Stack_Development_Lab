<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HotSpring - Edit Billing Address</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="utility-bar">
        <div class="container">
            <span class="support">Call for Customer support: <span class="red-text">020 38980845</span></span>
            <div class="top-links">
                <a href="#">My Account</a> | <a href="#">Wishlist</a> | <a href="#">To Checkout</a>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo-area">
                <h1 class="brand-name">HotSpring<sup>&reg;</sup></h1>
                <p class="brand-tagline">Portable Spas</p>
            </div>
            <div class="cart-box">
                <span class="cart-icon">🛒</span> My Cart: 0 items (0)
            </div>
        </div>
    </header>

    <nav class="red-nav">
        <div class="container nav-flex">
            <ul class="nav-links">
                <li>CATEGORY <span class="arrow">▼</span></li>
                <li>BRAND <span class="arrow">▼</span></li>
                <li>INFO <span class="arrow">▼</span></li>
            </ul>
            <div class="search-box">
                <input type="text" placeholder="Search">
                <button>SEARCH</button>
            </div>
        </div>
    </nav>

    <div class="page-body">
        <div class="container">
            <div class="breadcrumb">Home > User Account > My Account</div>
            
            <div class="white-card">
                <h1>Edit Billing Address</h1>
                <p class="intro-text">Please fill the form below to update your Profile details.</p>
                <p class="required-note">* Required Fields</p>

                <form id="billingForm">
                    <div class="form-group">
                        <label>First Name <span>*</span></label>
                        <input type="text" value="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name <span>*</span></label>
                        <input type="text" value="Surname" required>
                    </div>
                    <div class="form-group">
                        <label>Email <span>*</span></label>
                        <input type="email" value="email@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone <span>*</span></label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>City <span>*</span></label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>State <span>*</span></label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Zip Code <span>*</span></label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Country <span>*</span></label>
                        <input type="text" required>
                    </div>

                    <div class="button-area">
                        <button type="submit" class="update-btn">UPDATE ADDRESS</button>
                    </div>
                </form>
            </div>

            <div class="partner-strip">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRa0tqS3-IPQCcIgYpa8oYhwKfbUDTrJr5pw&s" alt="Save $1000s">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnzzObgPWN9csKUIaRsPP5PCNQWocVwzXm4w&s" alt="Oceanic">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLh96M7Y10Xoo8_3v_1CJbUhHWvLNJtMxViw&s" alt="Caldera">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJcA1NlOxu93EBWMsattwCsGvNG3av3EPrKQ&s" alt="Island">
            </div>
        </div>
    </div>

</body>
</html>
